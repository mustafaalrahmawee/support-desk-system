services:
  # ─────────────────────── MySQL Database ──────────────────────────────
  db:
    image: mysql:8.4
    container_name: support_desk_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: api
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - support_desk_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────── Laravel API Backend ────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: support_desk_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: api
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
      - api_storage:/var/www/html/storage
    ports:
      - "8000:8000"
    networks:
      - support_desk_network

  # ─────────────────────── Vue.js App Frontend ────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: support_desk_app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules   # named volume: überlebt Neustarts, wird automatisch mit npm install befüllt
    ports:
      - "5173:5173"
    networks:
      - support_desk_network

  # ─────────────────────── Qdrant Vector DB (Phase 3, optional) ──────
  # Auskommentiert — nur aktivieren wenn RAG-Features implementiert werden.
  # qdrant:
  #   image: qdrant/qdrant:v1.12.1
  #   container_name: support_desk_qdrant
  #   restart: unless-stopped
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   networks:
  #     - support_desk_network

  # ─────────────────────── FastAPI AI Service (Phase 5, optional) ───
  # Auskommentiert — nur aktivieren wenn FastAPI-Service benötigt wird.
  # ai_service:
  #   build:
  #     context: ./ai-service
  #     dockerfile: Dockerfile
  #   container_name: support_desk_ai_service
  #   restart: unless-stopped
  #   depends_on:
  #     - db
  #     - qdrant
  #   environment:
  #     DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-secret}@db:3306/api
  #     QDRANT_URL: http://qdrant:6333
  #   ports:
  #     - "8001:8001"
  #   networks:
  #     - support_desk_network

# ─────────────────────── Volumes ────────────────────────────────────
volumes:
  db_data:
    driver: local
  api_storage:
    driver: local
  app_node_modules:       # node_modules als named volume — kein Rebuild nötig bei neuen Paketen
    driver: local
  # qdrant_data:          # Phase 3 — aktivieren wenn Qdrant verwendet wird
  #   driver: local

# ─────────────────────── Networks ───────────────────────────────────
networks:
  support_desk_network:
    driver: bridge
